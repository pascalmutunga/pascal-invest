<!DOCTYPE html> <html lang="fr"> <head> 
    <meta charset="UTF-8"> <meta 
    name="viewport" 
    content="width=device-width, 
    initial-scale=1.0"> 
    <title>Couverture | Pascal 
    Invest</title> <style>
        body { background: #000; color: 
        #fff; font-family: sans-serif; 
        padding: 0; margin: 0; 
        text-align: center; } 
        .cover-preview { width: 100%; 
        height: 220px; background: #111; 
        border-bottom: 2px solid 
        #d4af37; overflow: hidden; } 
        #preview-cover { width: 100%; 
        #height: 100%; object-fit: 
        #cover; }
        .content { padding: 40px 20px; } 
        .btn-gold { background: 
        transparent; border: 2px solid 
        #d4af37; color: #d4af37; 
        padding: 15px 40px; 
        border-radius: 10px; 
        font-weight: bold; cursor: 
        pointer; text-transform: 
        uppercase; } input[type="file"] 
        { display: none; }
    </style> </head> <body> <div 
    class="cover-preview">
        <img id="preview-cover" 
        src="https://via.placeholder.com/800x220/111111/d4af37?text=APERÇU+COUVERTURE" 
        alt="Couverture">
    </div> <div class="content"> <h2 
        style="color:#d4af37;">PHOTO DE 
        COUVERTURE</h2> <p 
        style="color:#888; 
        margin-bottom:30px;">Donnez du 
        style à votre compte Pascal 
        Invest.</p> <label 
        for="file-cover" 
        class="btn-gold">SÉLECTIONNER 
        UNE IMAGE</label> <input 
        type="file" id="file-cover" 
        accept="image/*" 
        onchange="showCover(event)"> <p 
        style="margin-top:50px;"><a 
        href="portefeuille.html" 
        style="color:#555; 
        text-decoration:none;">Annuler 
        les changements</a></p>
    </div> <script> function 
        showCover(event) {
            if(event.target.files.length 
            > 0) {
                let src = 
                URL.createObjectURL(event.target.files[0]); 
                let preview = 
                document.getElementById("preview-cover"); 
                preview.src = src;
            }
        }
    </script> </body> </html>
