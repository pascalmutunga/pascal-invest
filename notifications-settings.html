<!DOCTYPE html> <html lang="fr"> <head> 
    <meta charset="UTF-8"> <meta 
    name="viewport" 
    content="width=device-width, 
    initial-scale=1.0"> <title>Alertes | 
    Pascal Invest</title> <style>
        body { background: #000; color: 
        #fff; font-family: sans-serif; 
        padding: 25px; } .header { 
        text-align: center; 
        margin-bottom: 30px; } 
        .setting-card {
            background: #111; border: 
            1px solid #222; padding: 
            20px; border-radius: 15px; 
            display: flex; 
            justify-content: 
            space-between; align-items: 
            center; margin-bottom: 15px;
        }
        .info { flex: 1; margin-right: 
        15px; } .title { font-weight: 
        bold; color: #d4af37; font-size: 
        16px; } .desc { font-size: 11px; 
        color: #666; margin-top: 5px; }
        
        /* Switch personnalisé */ 
        .switch { position: relative; 
        display: inline-block; width: 
        50px; height: 26px; } .switch 
        input { opacity: 0; width: 0; 
        height: 0; } .slider { position: 
        absolute; cursor: pointer; top: 
        0; left: 0; right: 0; bottom: 0; 
        background-color: #333; 
        transition: .4s; border-radius: 
        34px; } .slider:before { 
        position: absolute; content: ""; 
        height: 18px; width: 18px; left: 
        4px; bottom: 4px; 
        background-color: white; 
        transition: .4s; border-radius: 
        50%; } input:checked + .slider { 
        background-color: #d4af37; } 
        input:checked + .slider:before { 
        transform: translateX(24px); }
    </style> </head> <body> <div 
    class="header">
        <h2 style="color:#d4af37; 
        margin:0;">NOTIFICATIONS</h2> <p 
        style="color:#888; 
        font-size:12px;">Choisissez vos 
        canaux d'information.</p>
    </div> <div class="setting-card"> 
        <div class="info">
            <div class="title">Alertes 
            WhatsApp</div> <div 
            class="desc">Recevoir un 
            message pour chaque profit 
            quotidien.</div>
        </div> <label class="switch"> 
            <input type="checkbox" 
            checked> <span 
            class="slider"></span>
        </label> </div> <div 
    class="setting-card">
        <div class="info"> <div 
            class="title">Rapport par 
            Email</div> <div 
            class="desc">Résumé 
            hebdomadaire de vos 
            performances.</div>
        </div> <label class="switch"> 
            <input type="checkbox"> 
            <span class="slider"></span>
        </label> </div> <div 
    class="setting-card">
        <div class="info"> <div 
            class="title">Alertes 
            SMS</div> <div 
            class="desc">Alerte de 
            sécurité en cas de nouvelle 
            connexion.</div>
        </div> <label class="switch"> 
            <input type="checkbox" 
            checked> <span 
            class="slider"></span>
        </label> </div> <button 
    onclick="save()" 
    style="background:#d4af37; 
    color:#000; border:none; width:100%; 
    padding:15px; border-radius:30px; 
    font-weight:bold; margin-top:20px; 
    cursor:pointer;">ENREGISTRER LES 
    PRÉFÉRENCES</button> <p 
    style="text-align:center; 
    margin-top:30px;">
        <a href="portefeuille.html" 
        style="color:#555; 
        text-decoration:none; 
        font-size:12px;">← Retour au 
        Dashboard</a>
    </p> <script> function save() { 
            alert("Préférences mises à 
            jour !");
        }
    </script> </body> </html>
