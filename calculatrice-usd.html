<!DOCTYPE html> <html lang="fr"> <head> 
    <meta charset="UTF-8"> <title>Calcul 
    USD | Pascal Invest</title> <style>
        body { background: #000; color: 
        #fff; font-family: sans-serif; 
        padding: 25px; text-align: 
        center; } .box { border: 2px 
        solid #3498db; padding: 30px; 
        border-radius: 20px; background: 
        #080808; max-width: 400px; 
        margin: auto; } input { width: 
        100%; padding: 15px; margin: 
        15px 0; background: #000; 
        border: 1px solid #333; color: 
        #3498db; font-size: 22px; 
        border-radius: 10px; text-align: 
        center; }
        #res { font-size: 35px; 
        #font-weight: bold; color: #fff; 
        #}
    </style> </head> <body> <h2 
    style="color:#3498db;">DÉPÔT EN 
    DOLLARS ($)</h2> <div class="box">
        <input type="number" id="usd" 
        placeholder="Montant en $" 
        oninput="calc()"> <div 
        style="color:#888; 
        font-size:14px;">Conversion USDT 
        :</div>
        <div id="res">0.00 USDT</div> 
    </div> <p 
    style="margin-top:30px;"><a 
    href="portefeuille.html" 
    style="color:#555; 
    text-decoration:none; 
    font-size:12px;">← Retour</a></p> 
    <script>
        function calc() { let v = 
            document.getElementById('usd').value; 
            document.getElementById('res').innerText 
            = parseFloat(v || 
            0).toFixed(2) + " USDT";
        }
    </script> </body> </html>
