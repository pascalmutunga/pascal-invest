<!DOCTYPE html> <html lang="fr"> <head> 
    <meta charset="UTF-8"><meta 
    name="viewport" 
    content="width=device-width, 
    initial-scale=1.0"> <title>Chat Live 
    | Support Pascal</title>
    <style> body { background: #000;

        border-bottom: 1px solid

        background: #111; padding: 15px;

        input { flex: 1; background:

        border-radius: 20px; }

    class="chat-header">ASSISTANCE

    class="messages">
        <div class="msg admin">Bonjour ! 
        Comment puis-je vous aider dans 
        vos investissements aujourd'hui 
        ?</div> <div class="msg 
        user">Bonjour, je voulais savoir

        rapide ?</div> <div class="msg

    </div> <div class="input-area"> 
        <input type="text"

    </div> </body> </html>
